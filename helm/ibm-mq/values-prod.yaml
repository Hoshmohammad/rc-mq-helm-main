replicaCount: 3  # Native HA: 3 replicas (1 active + 2 standby)

persistence:
  size: 200Gi

resources:
  limits:
    cpu: "6"
    memory: 64Gi
  requests:
    cpu: "4"
    memory: 16Gi

mqsc: |
  DEFINE QLOCAL('PROD.QUEUE.1') REPLACE DEFPSIST(YES)
  DEFINE QLOCAL('PROD.QUEUE.2') REPLACE DEFPSIST(YES)
  DEFINE QLOCAL('PROD.DEAD.LETTER.QUEUE') REPLACE DEFPSIST(YES)
  DEFINE CHANNEL('PROD.APP.SVRCONN') CHLTYPE(SVRCONN) REPLACE
  SET CHLAUTH('PROD.APP.SVRCONN') TYPE(BLOCKUSER) USERLIST('nobody')
  SET CHLAUTH('*') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(NOACCESS)
  SET CHLAUTH('PROD.APP.SVRCONN') TYPE(ADDRESSMAP) ADDRESS('*') USERSRC(CHANNEL) CHCKCLNT(REQUIRED)
  ALTER AUTHINFO(SYSTEM.DEFAULT.AUTHINFO.IDPWOS) AUTHTYPE(IDPWOS) ADOPTCTX(YES)
  REFRESH SECURITY TYPE(CONNAUTH)
  DEFINE LISTENER('PROD.LISTENER.TCP') TRPTYPE(TCP) PORT(1414) REPLACE
  START LISTENER('PROD.LISTENER.TCP')
