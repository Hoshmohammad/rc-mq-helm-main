apiVersion: v1
kind: Service
metadata:
  name: {{ include "ibm-mq.fullname" . }}-headless
  labels:
    {{- include "ibm-mq.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.ports.replication }}
      targetPort: replication
      protocol: TCP
      name: replication
  selector:
    {{- include "ibm-mq.selectorLabels" . | nindent 4 }}
