name: IBM MQ Deployment

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Helm Charts
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint ./helm/ibm-mq

      - name: Helm template dry-run (qa)
        run: |
          helm template ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-qa.yaml \
            --set mq.adminPassword=dummyAdminPass \
            --set mq.appPassword=dummyAppPass \
            --debug

      - name: Helm template dry-run (stage)
        run: |
          helm template ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-stage.yaml \
            --set mq.adminPassword=dummyAdminPass \
            --set mq.appPassword=dummyAppPass \
            --debug

      - name: Helm template dry-run (prod)
        run: |
          helm template ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-prod.yaml \
            --set mq.adminPassword=dummyAdminPass \
            --set mq.appPassword=dummyAppPass \
            --debug

  deploy-qa:
    name: Deploy to QA
    needs: validate
    runs-on: self-hosted
    environment: qa
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Authenticate to QA cluster
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_QA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ibm-mq-qa --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy IBM MQ to QA
        run: |
          helm upgrade --install ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-qa.yaml \
            --namespace ibm-mq-qa \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/ibm-messaging/mq" \
            --set mq.adminPassword="${{ secrets.MQ_ADMIN_PASSWORD }}" \
            --set mq.appPassword="${{ secrets.MQ_APP_PASSWORD }}" \
            --wait \
            --timeout 5m

  deploy-stage:
    name: Deploy to Stage
    needs: deploy-qa
    runs-on: self-hosted
    environment: stage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Authenticate to Stage cluster
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGE }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ibm-mq-stage --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy IBM MQ to Stage
        run: |
          helm upgrade --install ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-stage.yaml \
            --namespace ibm-mq-stage \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/ibm-messaging/mq" \
            --set mq.adminPassword="${{ secrets.MQ_ADMIN_PASSWORD }}" \
            --set mq.appPassword="${{ secrets.MQ_APP_PASSWORD }}" \
            --wait \
            --timeout 5m

  deploy-prod:
    name: Deploy to Production
    needs: deploy-stage
    runs-on: self-hosted
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Authenticate to Production cluster
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace ibm-mq-prod --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy IBM MQ to Production
        run: |
          helm upgrade --install ibm-mq ./helm/ibm-mq \
            -f ./helm/ibm-mq/values-prod.yaml \
            --namespace ibm-mq-prod \
            --set image.repository="${{ secrets.ACR_LOGIN_SERVER }}/ibm-messaging/mq" \
            --set mq.adminPassword="${{ secrets.MQ_ADMIN_PASSWORD }}" \
            --set mq.appPassword="${{ secrets.MQ_APP_PASSWORD }}" \
            --wait \
            --timeout 5m
