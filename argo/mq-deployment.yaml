apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: QM2
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Hoshmohammad/rc-mq-helm-main.git
    targetRevision: HEAD
    path: rc-mq-helm-main
    helm:
      releaseName: QM2
      valueFiles:
        - samples/AzureAKSFreeTier/deploy/secureapp.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true