apiVersion: batch/v1
kind: Job
metadata:
  name: mq-install
  annotations:
    argocd.argoproj.io/hook: Sync
spec:
  template:
    spec:
      containers:
      - name: install
        image: alpine
        command: ["/bin/sh","-c"]
        args:
          - |
            echo "Running install"
            cd /repo/samples/AzureAKS/deploy
            ./install
      restartPolicy: Never