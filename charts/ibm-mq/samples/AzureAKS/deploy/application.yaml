apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ibm-mq-aks
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Hoshmohammad/rc-mq-helm-main.git
    targetRevision: HEAD
    path: charts/ibm-mq

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true