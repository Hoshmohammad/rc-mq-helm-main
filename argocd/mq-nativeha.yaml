apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mq-nativeha
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Hoshmohammad/rc-mq-helm-main.git
    targetRevision: HEAD
    path: charts/ibm-mq

    helm:
      releaseName: qm2
      valueFiles:
        - argocd/secureapp_nativeha.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true